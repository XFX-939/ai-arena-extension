<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI Arena 群聊</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="popup-themes.css">
</head>
<body>
  <div class="chat-app">
    <aside class="chat-sidebar" id="chat-sidebar">
      <header class="sidebar-header">
        <span class="sidebar-title">对话目录</span>
        <span class="sidebar-count" id="sidebar-count">0</span>
        <button class="sidebar-toggle" id="sidebar-toggle" title="折叠 / 展开侧栏">‹</button>
      </header>
      <div class="sidebar-search-bar">
        <input type="text" id="sidebar-search" class="sidebar-search" placeholder="搜索…" autocomplete="off">
        <button class="sidebar-mode-toggle" id="sidebar-mode-toggle" data-mode="question" title="仅搜提问，点击切换全局（含 AI 回答）">❓</button>
      </div>
      <div class="sidebar-list" id="sidebar-list">
        <div class="sidebar-empty">暂无对话</div>
      </div>
      <div class="sidebar-grabber" id="sidebar-grabber" title="拖动调整宽度"></div>
    </aside>
    <div class="chat-main">
    <header class="chat-header">
      <div class="chat-title">
        <img class="chat-icon" src="icons/icon48.png" alt="">
        <span class="chat-name">AI Arena</span>
        <span class="chat-subtitle">群聊</span>
        <span class="chat-version">v4.5.0-beta</span>
      </div>
      <div class="chat-actions">
        <button class="btn-icon" id="btn-clear" title="仅清空群聊窗口（不动 AI / 辩论上下文）" aria-label="清空群聊">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
          </svg>
        </button>
        <button class="btn-icon danger" id="btn-hard-reset" title="彻底初始化：移除所有 AI + 清空群聊 + 清辩论轮次" aria-label="彻底初始化">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </button>
      </div>
    </header>
    <main class="chat-messages" id="chat-messages">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">👋</div>
        <div class="empty-text">群聊已就绪</div>
        <div class="empty-hint">输入消息广播给所有参与者</div>
      </div>
    </main>
    <div class="chat-roster" id="chat-roster">
      <span class="roster-label">下轮发言</span>
      <div class="roster-items" id="roster-items"></div>
      <span class="roster-count" id="roster-count">0 / 0</span>
    </div>
    <footer class="chat-input-bar">
      <div class="task-picker-wrap">
        <button class="task-picker" id="task-picker-btn" type="button">
          <span class="icon">⚙️</span>
          <span class="picker-label">任务</span>
          <span class="picked" id="task-picked-pill">同时提问</span>
          <span class="caret">▾</span>
        </button>
        <div class="task-menu" id="task-menu" hidden>
          <div class="menu-item" data-task="ask"><span class="em">💬</span><span>同时提问</span></div>
          <div class="menu-item has-sub"><span class="em">⚔️</span><span>辩论</span><span class="caret">▸</span>
            <div class="sub-menu">
              <div class="menu-item" data-task="debate" data-style="free">⚔️ 自由辩论</div>
              <div class="menu-item" data-task="debate" data-style="collab">🤝 群策群力</div>
            </div>
          </div>
          <div class="menu-item has-sub"><span class="em">📋</span><span>裁判总结</span><span class="caret">▸</span>
            <div class="sub-menu" id="summary-judge-list"></div>
          </div>
          <div class="menu-item has-sub"><span class="em">📊</span><span>PPT 制作</span><span class="caret">▸</span>
            <div class="sub-menu">
              <div class="menu-item" data-task="ppt" data-kind="copy">📝 文案生成</div>
              <div class="menu-item" data-task="ppt" data-kind="image">🎨 图片生成</div>
              <div class="menu-item" data-task="ppt" data-kind="pptx">📊 PPT 生成</div>
            </div>
          </div>
        </div>
      </div>
      <div class="chat-input-wrap">
        <div id="chat-input" class="chat-input" contenteditable="true"
             data-placeholder="输入消息…  Ctrl+Enter 发送  @ 单发"></div>
        <div class="mention-menu" id="mention-menu" hidden></div>
      </div>
      <button class="btn-send" id="btn-send" title="发送 (Ctrl+Enter)" aria-label="发送">
        <svg class="btn-send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 19V5"/>
          <path d="M5 12l7-7 7 7"/>
        </svg>
      </button>
    </footer>
    </div>
    <aside class="chat-rightpanel" id="chat-rightpanel">
      <div class="rp-tabs">
        <button class="rp-tab active" data-tab="members" aria-label="成员">
          <svg class="rp-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span>成员</span>
        </button>
        <button class="rp-tab" data-tab="tasks" aria-label="任务">
          <svg class="rp-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span>任务</span>
        </button>
        <button class="rp-tab" data-tab="stats" aria-label="统计">
          <svg class="rp-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
            <line x1="3" y1="20" x2="21" y2="20"/>
          </svg>
          <span>统计</span>
        </button>
        <button class="rp-tab" data-tab="templates" aria-label="模板">
          <svg class="rp-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="13" x2="15" y2="13"/>
            <line x1="9" y1="17" x2="15" y2="17"/>
            <line x1="9" y1="9" x2="11" y2="9"/>
          </svg>
          <span>模板</span>
        </button>
        <button class="rp-tab" data-tab="settings" aria-label="设置">
          <svg class="rp-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="4" y1="21" x2="4" y2="14"/>
            <line x1="4" y1="10" x2="4" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12" y2="3"/>
            <line x1="20" y1="21" x2="20" y2="16"/>
            <line x1="20" y1="12" x2="20" y2="3"/>
            <line x1="1" y1="14" x2="7" y2="14"/>
            <line x1="9" y1="8" x2="15" y2="8"/>
            <line x1="17" y1="16" x2="23" y2="16"/>
          </svg>
          <span>设置</span>
        </button>
      </div>
      <div class="rp-panel active" data-rp-panel="members" id="rp-panel-members"></div>
      <div class="rp-panel" data-rp-panel="tasks" id="rp-panel-tasks"></div>
      <div class="rp-panel" data-rp-panel="stats" id="rp-panel-stats"></div>
      <div class="rp-panel" data-rp-panel="templates" id="rp-panel-templates"></div>
      <div class="rp-panel" data-rp-panel="settings" id="rp-panel-settings"></div>
    </aside>
  </div>
  <div class="tpl-modal-mask" id="tpl-modal-mask" hidden>
    <div class="tpl-modal">
      <div class="tpl-modal-header">
        <span class="tpl-modal-emoji" id="tpl-modal-emoji">⚔️</span>
        <span class="tpl-modal-title" id="tpl-modal-title">编辑模板</span>
        <span class="tpl-modal-badge" id="tpl-modal-badge">内置</span>
      </div>
      <div class="tpl-modal-body" id="tpl-modal-body"></div>
      <div class="tpl-modal-footer" id="tpl-modal-footer"></div>
    </div>
  </div>
  <div class="tpl-toast" id="tpl-toast"></div>
  <script src="popup-markdown.js"></script>
  <script src="popup-codepreview.js"></script>
  <script src="popup-bubble-actions.js"></script>
  <script src="popup-history.js"></script>
  <script src="popup-roster.js"></script>
  <script src="popup-rightpanel.js"></script>
  <script src="popup-members.js"></script>
  <script src="popup-tasks.js"></script>
  <script src="popup-stats.js"></script>
  <script src="popup-settings.js"></script>
  <script src="templates-builtin.js"></script>
  <script src="template-store.js"></script>
  <script src="popup-templates.js"></script>
  <script src="popup-task-menu.js"></script>
  <script src="popup.js"></script>
</body>
</html>
