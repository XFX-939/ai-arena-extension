<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI Arena 群聊</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="popup-themes.css">
</head>
<body>
  <div class="chat-app">
    <aside class="chat-sidebar" id="chat-sidebar">
      <header class="sidebar-header">
        <span class="sidebar-title">对话目录</span>
        <span class="sidebar-count" id="sidebar-count">0</span>
        <button class="sidebar-toggle" id="sidebar-toggle" title="折叠 / 展开侧栏">‹</button>
      </header>
      <div class="sidebar-search-bar">
        <input type="text" id="sidebar-search" class="sidebar-search" placeholder="搜索…" autocomplete="off">
        <button class="sidebar-mode-toggle" id="sidebar-mode-toggle" data-mode="question" title="仅搜提问，点击切换全局（含 AI 回答）">❓</button>
      </div>
      <div class="sidebar-list" id="sidebar-list">
        <div class="sidebar-empty">暂无对话</div>
      </div>
      <div class="sidebar-grabber" id="sidebar-grabber" title="拖动调整宽度"></div>
    </aside>
    <div class="chat-main">
    <header class="chat-header">
      <div class="chat-title">
        <img class="chat-icon" src="icons/icon48.png" alt="">
        <span class="chat-name">AI Arena</span>
        <span class="chat-subtitle">群聊</span>
        <span class="chat-version">v4.8.25-beta</span>
      </div>
      <div class="chat-actions">
        <!-- v4.8.15 F30: 折叠到顶 — mini bar 模式触发器 -->
        <button class="btn-mini-mode" id="btn-mini-mode" type="button" title="折叠到顶部一行 / 展开恢复">⇲ 折叠到顶</button>
        <div class="hdr-mode-toggle" id="hdr-mode-toggle" role="group" aria-label="AI 窗口布局">
          <button type="button" class="hdr-mode-btn" data-mode="tab" title="所有 AI 同窗口不同标签页">Tab</button>
          <button type="button" class="hdr-mode-btn" data-mode="tiled" title="每个 AI 独立窗口并列">并列</button>
        </div>
        <!-- v4.8.22: 清空 → 扫帚（broom）SVG，比垃圾桶更动感 + 仪式感 -->
        <button class="btn-icon" id="btn-clear" title="仅清空群聊窗口（不动 AI / 辩论上下文）" aria-label="清空群聊">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M19 11 9.6 1.6a1 1 0 0 0-1.4 0L7 2.8a1 1 0 0 0 0 1.4L16.4 13.6"/>
            <path d="m13 16-3.5-3.5"/>
            <path d="M14 13c-1.5 1.5-3 4-3 6-4 0-7-3-7-7 2 0 4.5-1.5 6-3"/>
            <path d="m22 22-5-5"/>
          </svg>
        </button>
        <!-- v4.8.22: 重置 → 圆环 + 内含闪电（保留"⚡力量"语义，加圆环表达"循环重启"） -->
        <button class="btn-icon danger" id="btn-hard-reset" title="彻底初始化：移除所有 AI + 清空群聊 + 清辩论轮次" aria-label="彻底初始化">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-3-6.7"/>
            <path d="M21 4v5h-5"/>
            <polygon points="12.5 9 10 13 13 13 11 17 14 12 11 12" fill="currentColor" stroke="none"/>
          </svg>
        </button>
      </div>
    </header>
    <!-- v4.8.20 ③ 辩论轮次徽章 — JS 监听 chatStreamUpdate displayText 控制显隐 -->
    <div class="arena-badge" id="arena-badge" hidden>
      <span class="arena-badge-em">⚔️</span>
      <span class="arena-badge-text" id="arena-badge-text">Round 1</span>
      <span class="arena-badge-mode" id="arena-badge-mode">自由辩论</span>
    </div>
    <main class="chat-messages" id="chat-messages">
      <div class="empty-state" id="empty-state">
        <!-- v4.8.12: 上 2/3 横版海报 + 下 1/3 自定义文案（标题 + 6 大功能 + CTA） -->
        <!-- v4.8.20 ⑤ 12 颗星点散落海报区，CSS twinkle 延迟错开（无 JS）-->
        <span class="es-star" style="top:8%;left:10%"></span>
        <span class="es-star" style="top:14%;left:78%"></span>
        <span class="es-star es-star-big" style="top:22%;left:42%"></span>
        <span class="es-star" style="top:32%;left:18%"></span>
        <span class="es-star" style="top:36%;left:88%"></span>
        <span class="es-star es-star-big" style="top:48%;left:6%"></span>
        <span class="es-star" style="top:52%;left:62%"></span>
        <span class="es-star" style="top:58%;left:30%"></span>
        <span class="es-star" style="top:62%;left:94%"></span>
        <span class="es-star es-star-big" style="top:70%;left:54%"></span>
        <span class="es-star" style="top:78%;left:14%"></span>
        <span class="es-star" style="top:84%;left:74%"></span>
        <img class="es-poster" src="icons/poster-ai-team.webp" alt="AI Arena — 让 AI 同台辩论，逼近真相">
        <div class="es-pitch">
          <h2 class="es-pitch-title">让 <span class="es-pitch-em">AI 同台辩论</span>，逼近真相</h2>
          <div class="es-pitch-features">
            <span class="es-feat"><span class="es-feat-em">⚔️</span> 自由辩论</span>
            <span class="es-feat"><span class="es-feat-em">🤝</span> 群策群力</span>
            <span class="es-feat"><span class="es-feat-em">📋</span> 裁判总结</span>
            <span class="es-feat"><span class="es-feat-em">🎭</span> 角色分工</span>
            <span class="es-feat"><span class="es-feat-em">📐</span> 任务模板</span>
            <span class="es-feat"><span class="es-feat-em">📊</span> PPT 工坊</span>
          </div>
          <div class="es-pitch-cta">→ 在右侧添加至少 2 个 AI 选手开始</div>
        </div>
      </div>
    </main>
    <div class="chat-roster" id="chat-roster">
      <span class="roster-label">下轮发言</span>
      <div class="roster-items" id="roster-items"></div>
      <span class="roster-upload-hint" title="文件上传需直接到 AI 网页操作 (避免敏感文件经过插件中转)">
        🔒 为保证信息安全，文件上传请手动到对应 AI 窗口操作
      </span>
      <span class="roster-count" id="roster-count">0 / 0</span>
    </div>
    <footer class="chat-input-bar">
      <div class="task-picker-wrap">
        <button class="task-picker" id="task-picker-btn" type="button" title="切换任务模式">
          <span class="picked" id="task-picked-pill">同时提问</span>
          <span class="caret">▾</span>
        </button>
        <div class="task-menu" id="task-menu" hidden>
          <div class="menu-item" data-task="ask"><span class="em">💬</span><span>同时提问</span></div>
          <div class="menu-item has-sub"><span class="em">⚔️</span><span>辩论</span><span class="caret">▸</span>
            <div class="sub-menu">
              <div class="menu-item" data-task="debate" data-style="free">⚔️ 自由辩论</div>
              <div class="menu-item" data-task="debate" data-style="collab">🤝 群策群力</div>
            </div>
          </div>
          <div class="menu-item has-sub"><span class="em">📋</span><span>裁判总结</span><span class="caret">▸</span>
            <div class="sub-menu" id="summary-judge-list"></div>
          </div>
          <div class="menu-item has-sub"><span class="em">📊</span><span>PPT 制作</span><span class="caret">▸</span>
            <div class="sub-menu">
              <div class="menu-item" data-task="ppt" data-kind="copy">📝 文案生成</div>
              <div class="menu-item" data-task="ppt" data-kind="image">🎨 图片生成</div>
              <div class="menu-item" data-task="ppt" data-kind="pptx">📊 PPT 生成</div>
            </div>
          </div>
        </div>
      </div>
      <div class="chat-input-wrap">
        <div id="chat-input" class="chat-input" contenteditable="true"
             data-placeholder="输入消息…  Ctrl+Enter 发送  @ 单发"></div>
        <div class="mention-menu" id="mention-menu" hidden></div>
      </div>
      <button class="btn-send" id="btn-send" title="发送 (Ctrl+Enter)" aria-label="发送">
        <svg class="btn-send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 19V5"/>
          <path d="M5 12l7-7 7 7"/>
        </svg>
      </button>
    </footer>
    </div>
    <aside class="chat-rightpanel" id="chat-rightpanel">
      <div class="rp-top" id="rp-top">
      <div class="rp-tabs">
        <button class="rp-tab active" data-tab="members" aria-label="成员">
          <svg class="rp-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span>成员</span>
        </button>
        <button class="rp-tab" data-tab="tasks" aria-label="任务">
          <svg class="rp-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span>任务</span>
        </button>
        <button class="rp-tab" data-tab="stats" aria-label="统计">
          <svg class="rp-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
            <line x1="3" y1="20" x2="21" y2="20"/>
          </svg>
          <span>统计</span>
        </button>
        <button class="rp-tab" data-tab="templates" aria-label="模板">
          <svg class="rp-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="13" x2="15" y2="13"/>
            <line x1="9" y1="17" x2="15" y2="17"/>
            <line x1="9" y1="9" x2="11" y2="9"/>
          </svg>
          <span>模板</span>
        </button>
        <button class="rp-tab" data-tab="settings" aria-label="设置">
          <svg class="rp-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="4" y1="21" x2="4" y2="14"/>
            <line x1="4" y1="10" x2="4" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12" y2="3"/>
            <line x1="20" y1="21" x2="20" y2="16"/>
            <line x1="20" y1="12" x2="20" y2="3"/>
            <line x1="1" y1="14" x2="7" y2="14"/>
            <line x1="9" y1="8" x2="15" y2="8"/>
            <line x1="17" y1="16" x2="23" y2="16"/>
          </svg>
          <span>设置</span>
        </button>
      </div>
      <div class="rp-panel active" data-rp-panel="members" id="rp-panel-members"></div>
      <div class="rp-panel" data-rp-panel="tasks" id="rp-panel-tasks"></div>
      <div class="rp-panel" data-rp-panel="stats" id="rp-panel-stats"></div>
      <div class="rp-panel" data-rp-panel="templates" id="rp-panel-templates"></div>
      <div class="rp-panel" data-rp-panel="settings" id="rp-panel-settings"></div>
      </div><!-- /.rp-top -->
      <div class="rp-bottom" id="rp-bottom">
        <div class="rp-log-header">
          <span>状态日志</span>
          <button class="rp-log-clear" id="rp-log-clear" title="清空日志">清空</button>
        </div>
        <div class="rp-log-box" id="rp-log-box">
          <div class="rp-log-empty">暂无日志</div>
        </div>
      </div>
    </aside>
  </div>
  <div class="tpl-modal-mask" id="tpl-modal-mask" hidden>
    <div class="tpl-modal">
      <div class="tpl-modal-header">
        <span class="tpl-modal-emoji" id="tpl-modal-emoji">⚔️</span>
        <span class="tpl-modal-title" id="tpl-modal-title">编辑模板</span>
        <span class="tpl-modal-badge" id="tpl-modal-badge">内置</span>
      </div>
      <div class="tpl-modal-body" id="tpl-modal-body"></div>
      <div class="tpl-modal-footer" id="tpl-modal-footer"></div>
    </div>
  </div>
  <div class="tpl-toast" id="tpl-toast"></div>
  <script src="popup-logo-style.js"></script>
  <script src="popup-arena-badge.js"></script>
  <script src="popup-markdown.js"></script>
  <script src="popup-codepreview.js"></script>
  <script src="popup-bubble-actions.js"></script>
  <script src="popup-history.js"></script>
  <script src="popup-roster.js"></script>
  <script src="popup-rightpanel.js"></script>
  <script src="popup-members.js"></script>
  <script src="popup-tasks.js"></script>
  <script src="popup-stats.js"></script>
  <script src="popup-settings.js"></script>
  <script src="popup-log.js"></script>
  <script src="popup-window-mode.js"></script>
  <script src="templates-builtin.js"></script>
  <script src="template-store.js"></script>
  <script src="popup-templates.js"></script>
  <script src="popup-role-hats.js"></script>
  <script src="popup-task-menu.js"></script>
  <script src="popup.js"></script>
  <script src="popup-mini-mode.js"></script>
</body>
</html>
