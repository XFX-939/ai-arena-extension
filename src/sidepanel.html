<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="sidepanel.css">
  <link rel="stylesheet" href="sidepanel-themes.css">
</head>
<body data-theme="C">
  <div class="header">
    <h1>AI Arena</h1>
    <span class="version">v2.5.0</span>
    <div class="theme-switcher">
      <button class="theme-btn" id="btn-theme">🎨</button>
      <div class="theme-menu" id="theme-menu">
        <div class="theme-menu-item" data-theme="C"><span class="theme-swatch" style="background:linear-gradient(135deg,#5eead4,#a78bfa)"></span>Aurora Glass</div>
        <div class="theme-menu-item" data-theme="A"><span class="theme-swatch" style="background:linear-gradient(135deg,#4f8cff,#6ee7ff)"></span>Dark Command</div>
        <div class="theme-menu-item" data-theme="B"><span class="theme-swatch" style="background:linear-gradient(135deg,#b85c38,#e6d7c8)"></span>Warm Editorial</div>
        <div class="theme-menu-item" data-theme="D"><span class="theme-swatch" style="background:linear-gradient(135deg,#ff2d95,#00f0ff)"></span>Neon Cyberpunk</div>
        <div class="theme-menu-item" data-theme="E"><span class="theme-swatch" style="background:linear-gradient(135deg,#1a1a2e,#fff)"></span>Minimal Light</div>
        <div class="theme-menu-item" data-theme="F"><span class="theme-swatch" style="background:linear-gradient(135deg,#ff8c42,#e84393)"></span>Gradient Sunset</div>
      </div>
    </div>
    <div class="mode-toggle">
      <button class="mode-opt" data-mode="tab" title="所有AI在同一窗口的不同标签页">Tab</button>
      <button class="mode-opt active" data-mode="tiled" title="每个AI独立窗口并列显示">并列</button>
    </div>
  </div>

  <!-- 参与者 -->
  <div class="section">
    <div class="section-title">
      <span>参与者 (<span id="participant-count">0</span>/3)</span>
      <span id="round-badge" class="round-badge" style="display:none"></span>
    </div>
    <div class="add-group">
      <button class="btn-add claude" data-service="claude"><img class="brand-icon" src="icons/brands/claude.svg">+ Claude</button>
      <button class="btn-add gemini" data-service="gemini"><img class="brand-icon" src="icons/brands/gemini.svg">+ Gemini</button>
      <button class="btn-add chatgpt" data-service="chatgpt"><img class="brand-icon" src="icons/brands/openai.svg">+ GPT</button>
    </div>
    <div class="add-group" style="margin-top: 4px;">
      <button class="btn-add deepseek" data-service="deepseek"><img class="brand-icon" src="icons/brands/deepseek.svg">+ DeepSeek</button>
      <button class="btn-add doubao" data-service="doubao"><img class="brand-icon" src="icons/brands/doubao.svg">+ 豆包</button>
      <button class="btn-add qwen" data-service="qwen"><img class="brand-icon" src="icons/brands/qwen.svg">+ 千问</button>
    </div>
    <div class="add-group" style="margin-top: 4px;">
      <button class="btn-add kimi" data-service="kimi"><img class="brand-icon" src="icons/brands/kimi.svg">+ Kimi</button>
      <button class="btn-add yuanbao" data-service="yuanbao"><img class="brand-icon" src="icons/brands/yuanbao.svg">+ 元宝</button>
      <button class="btn-add grok" data-service="grok"><img class="brand-icon" src="icons/brands/grok.svg">+ Grok</button>
    </div>
    <div id="participant-list" class="participant-list">
      <div class="empty-hint">点击上方按钮添加参与者</div>
    </div>
  </div>

  <!-- 同时提问 -->
  <div class="section broadcast-area">
    <div class="section-title">同时提问</div>
    <div id="broadcast-input" class="broadcast-editor" contenteditable="true"
         data-placeholder="输入问题，可直接粘贴图片&#10;Ctrl+Enter 发送"></div>
    <div id="image-previews" class="image-previews"></div>
    <div class="broadcast-actions">
      <label class="btn btn-tiny btn-upload" title="添加文件">
        📎 文件
        <input type="file" id="file-input" multiple hidden>
      </label>
      <div class="scenario-dropdown" id="scenario-dropdown">
        <button class="btn btn-tiny btn-scenario" id="btn-scenario" type="button">🎯 场景 ▾</button>
        <div class="scenario-menu" id="scenario-menu"></div>
      </div>
      <button class="btn btn-primary" id="btn-send" style="flex:1">发送给全部</button>
    </div>
  </div>

  <!-- 辩论（简化：仅开始按钮 + 可选引导） -->
  <div class="section">
    <div class="section-title">辩论</div>
    <div class="debate-mode-toggle">
      <button class="mode-btn active" data-mode="free">⚔️ 自由辩论<span class="hover-tip">各AI相互质疑、反驳对方观点，找出核心分歧，通过交锋逐步逼近真相</span></button>
      <button class="mode-btn" data-mode="collab">🤝 群策群力<span class="hover-tip">各AI取长补短、吸收彼此亮点，协作迭代出更完善的综合方案</span></button>
      <button class="mode-btn" data-mode="self">🔄 自审改进<span class="hover-tip">每个AI只看自己的上一轮回答，独立审视并改进，不受其他AI影响</span></button>
    </div>
    <details class="custom-details">
      <summary class="custom-summary">引导注入（可选）</summary>
      <textarea id="guidance-input" class="custom-textarea"
                placeholder="引导辩论方向，如：请重点讨论性能问题"></textarea>
    </details>
    <label class="concise-toggle">
      <input type="checkbox" id="concise-mode"> <span>简洁模式</span>
      <span class="hover-tip">限制每个AI回答在1000字以内，以要点列表形式呈现核心观点，减少冗长论述</span>
    </label>
    <div style="display:flex;gap:6px;margin-top:8px">
      <button class="btn btn-debate" id="btn-debate" style="flex:1;margin-top:0">开始辩论</button>
      <button class="btn btn-secondary" id="btn-debate-retry" style="padding:9px 12px;font-size:13px" title="强制重试（卡住时使用）">🔄</button>
    </div>
  </div>

  <!-- 辩论总结 -->
  <div class="section">
    <div class="section-title">辩论总结</div>
    <div class="summary-row">
      <select id="judge-select" class="select-input">
        <option value="">选择裁判...</option>
      </select>
      <button class="btn btn-summary" id="btn-summary">输出总结</button>
    </div>
    <div style="display:flex;gap:6px;margin-top:10px">
      <button class="btn btn-secondary" id="btn-export" style="flex:1">📤 导出</button>
      <button class="btn btn-secondary" id="btn-hard-reset" style="flex:1;color:#ef4444;border-color:#fca5a5">⚡ 重置</button>
    </div>
  </div>

  <!-- 状态日志 -->
  <div class="section">
    <div class="section-title">状态日志</div>
    <div class="log" id="log"></div>
  </div>

  <!-- 统计 -->
  <div class="section stats-section">
    <div class="section-title">
      <div class="stats-tabs">
        <button class="stats-tab active" data-tab="session">本次</button>
        <button class="stats-tab" data-tab="lifetime">历史累计</button>
        <button class="stats-tab" data-tab="models">模型</button>
      </div>
    </div>
    <div class="stats-grid" id="stats-session">
      <div class="stat-item"><span class="stat-val" id="stat-s-conversations">0</span><span class="stat-label">对话</span></div>
      <div class="stat-item"><span class="stat-val" id="stat-s-debates">0</span><span class="stat-label">辩论轮</span></div>
      <div class="stat-item"><span class="stat-val" id="stat-s-tokens">0</span><span class="stat-label">Token</span></div>
    </div>
    <div class="stats-grid" id="stats-lifetime" style="display:none">
      <div class="stat-item"><span class="stat-val" id="stat-l-conversations">0</span><span class="stat-label">对话</span></div>
      <div class="stat-item"><span class="stat-val" id="stat-l-debates">0</span><span class="stat-label">辩论轮</span></div>
      <div class="stat-item"><span class="stat-val" id="stat-l-tokens">0</span><span class="stat-label">Token</span></div>
    </div>
    <div class="stats-models" id="stats-models" style="display:none">
      <div class="models-list" id="models-list">
        <div class="empty-hint">暂无模型统计数据</div>
      </div>
    </div>
  </div>

  <div class="dynamic-tip" id="dynamic-tip"></div>
  <div class="footer">
    <div class="shortcuts-hint">快捷键: Ctrl+Enter 发送 | Ctrl+Shift+D 辩论</div>
    AI Arena v2.5.0
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
